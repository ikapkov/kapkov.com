<!doctype html>
<html lang="bg">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, follow" />
    <title>Страницата не е намерена | арх. Иво Капков</title>
    <link rel="icon" type="image/png" href="/assets/brand/logo.png" />
    <link rel="apple-touch-icon" href="/assets/brand/logo.png" />
    <link rel="stylesheet" href="/assets/styles.css?v=20260620-4" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand-group">
        <a class="brand" href="/news" aria-label="Начало" data-i18n-aria="homeLabel">
          <img src="/assets/brand/logo.png" alt="" />
          <span>арх. Иво Капков</span>
        </a>
        <div class="language-switcher" aria-label="Избор на език" data-i18n-aria="languageChoice">
          <button class="is-active" type="button" data-lang="bg" aria-pressed="true">БГ</button>
          <button type="button" data-lang="en" aria-pressed="false">EN</button>
        </div>
      </div>
      <nav class="site-nav" aria-label="Основна навигация" data-i18n-aria="primaryNav">
        <a href="/news" data-i18n="news">Актуално</a>
        <a href="/gallery" data-i18n="gallery">Галерия</a>
        <a href="/biography" data-i18n="biography">Биография</a>
        <a href="/contacts" data-i18n="contacts">Контакти</a>
      </nav>
    </header>

    <main class="error-page">
      <div class="error-content">
        <p class="error-code" aria-hidden="true">404</p>
        <h1 data-i18n="title">Страницата не е намерена</h1>
        <p data-i18n="message">Адресът може да е променен или страницата вече да не съществува.</p>
        <a class="error-home-link" href="/news" data-i18n="homeAction">Към началната страница</a>
      </div>
    </main>

    <footer class="site-footer">© 2026 Kapkov.com</footer>

    <script>
      const legacyRoutes = {
        "/актуално": "/news",
        "/галерия": "/gallery",
        "/биография": "/biography",
        "/контакти": "/contacts",
        "/aktualno": "/news",
        "/galeria": "/gallery",
        "/biografia": "/biography",
        "/kontakti": "/contacts"
      };
      const requestedPath = decodeURIComponent(window.location.pathname).replace(/\/+$/, "").toLowerCase();
      if (legacyRoutes[requestedPath]) {
        window.location.replace(legacyRoutes[requestedPath]);
      }

      const translations = {
        bg: {
          pageTitle: "Страницата не е намерена | арх. Иво Капков",
          homeLabel: "Начало",
          languageChoice: "Избор на език",
          primaryNav: "Основна навигация",
          news: "Актуално",
          gallery: "Галерия",
          biography: "Биография",
          contacts: "Контакти",
          title: "Страницата не е намерена",
          message: "Адресът може да е променен или страницата вече да не съществува.",
          homeAction: "Към началната страница"
        },
        en: {
          pageTitle: "Page not found | arch. Ivo Kapkov",
          homeLabel: "Home",
          languageChoice: "Language selection",
          primaryNav: "Main navigation",
          news: "News",
          gallery: "Gallery",
          biography: "Biography",
          contacts: "Contacts",
          title: "Page not found",
          message: "The address may have changed or the page may no longer exist.",
          homeAction: "Back to the home page"
        }
      };

      const languageButtons = [...document.querySelectorAll(".language-switcher button")];

      const applyLanguage = (language) => {
        const translation = translations[language];
        document.documentElement.lang = language;
        document.title = translation.pageTitle;

        document.querySelectorAll("[data-i18n]").forEach((element) => {
          element.textContent = translation[element.dataset.i18n];
        });

        document.querySelectorAll("[data-i18n-aria]").forEach((element) => {
          element.setAttribute("aria-label", translation[element.dataset.i18nAria]);
        });

        languageButtons.forEach((button) => {
          const isActive = button.dataset.lang === language;
          button.classList.toggle("is-active", isActive);
          button.setAttribute("aria-pressed", String(isActive));
        });

        localStorage.setItem("kapkov-language", language);
      };

      languageButtons.forEach((button) => {
        button.addEventListener("click", () => applyLanguage(button.dataset.lang));
      });

      applyLanguage(localStorage.getItem("kapkov-language") === "en" ? "en" : "bg");
    </script>
  </body>
</html>
